# Włączenie konsoli H2
spring.h2.console.enabled=true
# Ścieżka, pod którą znajdziesz konsolę w przeglądarce
spring.h2.console.path=/h2
# Stały URL bazy danych (żeby Spring nie losował nazwy przy każdym starcie)
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.generate-unique-name=false
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
#spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=KEY
server.port=8880
