plugins {
    id 'org.springframework.boot' version '3.2.5'
    id 'io.spring.dependency-management' version '1.1.4'
    id 'java'
}

group = 'com.example'
version = '0.0.1-SNAPSHOT'
sourceCompatibility = '17' // Wymagana Java 17 lub nowsza dla Spring Boot 3.x

repositories {
    mavenCentral()
}

dependencies {
    // Serwer webowy (potrzebny do wystawienia konsoli w przeglądarce)
    implementation 'org.springframework.boot:spring-boot-starter-web'

    // Baza danych H2
    runtimeOnly 'com.h2database:h2'
}